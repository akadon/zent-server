services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - redis-data:/data
    deploy:
      resources:
        limits:
          memory: 600M

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    restart: unless-stopped
    ports:
      - "127.0.0.1:4000:4000"
    env_file: .env.prod
    environment:
      API_PORT: "4000"
      NODE_OPTIONS: "--max-old-space-size=384"
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M

  auth:
    build:
      context: .
      dockerfile: docker/Dockerfile.auth
    restart: unless-stopped
    ports:
      - "127.0.0.1:4001:4001"
    env_file: .env.prod
    environment:
      API_PORT: "4001"
      NODE_OPTIONS: "--max-old-space-size=384"
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M

  gateway:
    build:
      context: .
      dockerfile: docker/Dockerfile.gateway
    restart: unless-stopped
    ports:
      - "127.0.0.1:4002:4002"
    env_file: .env.prod
    environment:
      API_PORT: "4002"
      NODE_OPTIONS: "--max-old-space-size=384"
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  redis-data:
