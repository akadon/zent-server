services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    command: sh -c "redis-server --appendonly no --save 300 1000 --maxmemory 16gb --maxmemory-policy volatile-lru --requirepass $$REDIS_PASSWORD --maxclients 500000 --tcp-keepalive 60 --tcp-backlog 65535 --timeout 0 --hz 100 --dynamic-hz yes"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD --no-auth-warning ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    env_file: .env.prod
    volumes:
      - redis-data:/data
    cap_drop: [ALL]
    cap_add: [DAC_OVERRIDE, SETGID, SETUID]
    security_opt: [no-new-privileges:true]
    ulimits:
      nofile:
        soft: 1048576
        hard: 1048576
    sysctls:
      net.core.somaxconn: 65535
    deploy:
      resources:
        limits:
          memory: 18G
          cpus: "1.0"

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    restart: unless-stopped
    ports:
      - "127.0.0.1:4000:4000"
    env_file: .env.prod
    environment:
      API_PORT: "4000"
      NODE_OPTIONS: "--max-old-space-size=384"
    depends_on:
      redis:
        condition: service_healthy
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    read_only: true
    tmpfs: [/tmp]
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 2
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 800M
          cpus: "0.5"

  auth:
    build:
      context: .
      dockerfile: docker/Dockerfile.auth
    restart: unless-stopped
    ports:
      - "127.0.0.1:4001:4001"
    env_file: .env.prod
    environment:
      API_PORT: "4001"
      NODE_OPTIONS: "--max-old-space-size=384"
    depends_on:
      redis:
        condition: service_healthy
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    read_only: true
    tmpfs: [/tmp]
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:4001/health"]
      interval: 10s
      timeout: 5s
      retries: 2
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 400M
          cpus: "0.25"

  # Gateway instances - each on a separate port for nginx upstream load balancing
  # All share Redis pub/sub for cross-instance event distribution
  # 4 shards: each gateway owns 1/4 of guilds by consistent hash
  gateway-1:
    build:
      context: .
      dockerfile: docker/Dockerfile.gateway
    restart: unless-stopped
    ports:
      - "127.0.0.1:4002:4002"
    env_file: .env.prod
    environment:
      API_PORT: "4002"
      GATEWAY_PORT: "4002"
      NODE_OPTIONS: "--max-old-space-size=768"
      ENABLE_PRESENCE: "false"
      GATEWAY_HEARTBEAT_INTERVAL: "60000"
      WORKER_ID: "1"
      PROCESS_ID: "1"
      SHARD_ID: "0"
      NUM_SHARDS: "4"
    depends_on:
      redis:
        condition: service_healthy
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    read_only: true
    tmpfs: [/tmp]
    ulimits:
      nofile:
        soft: 1048576
        hard: 1048576
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:4002/health"]
      interval: 10s
      timeout: 5s
      retries: 2
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "0.5"

  gateway-2:
    build:
      context: .
      dockerfile: docker/Dockerfile.gateway
    restart: unless-stopped
    ports:
      - "127.0.0.1:4012:4002"
    env_file: .env.prod
    environment:
      API_PORT: "4002"
      GATEWAY_PORT: "4002"
      NODE_OPTIONS: "--max-old-space-size=768"
      ENABLE_PRESENCE: "false"
      GATEWAY_HEARTBEAT_INTERVAL: "60000"
      WORKER_ID: "2"
      PROCESS_ID: "1"
      SHARD_ID: "1"
      NUM_SHARDS: "4"
    depends_on:
      redis:
        condition: service_healthy
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    read_only: true
    tmpfs: [/tmp]
    ulimits:
      nofile:
        soft: 1048576
        hard: 1048576
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:4002/health"]
      interval: 10s
      timeout: 5s
      retries: 2
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "0.5"

  gateway-3:
    build:
      context: .
      dockerfile: docker/Dockerfile.gateway
    restart: unless-stopped
    ports:
      - "127.0.0.1:4022:4002"
    env_file: .env.prod
    environment:
      API_PORT: "4002"
      GATEWAY_PORT: "4002"
      NODE_OPTIONS: "--max-old-space-size=768"
      ENABLE_PRESENCE: "false"
      GATEWAY_HEARTBEAT_INTERVAL: "60000"
      WORKER_ID: "3"
      PROCESS_ID: "1"
      SHARD_ID: "2"
      NUM_SHARDS: "4"
    depends_on:
      redis:
        condition: service_healthy
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    read_only: true
    tmpfs: [/tmp]
    ulimits:
      nofile:
        soft: 1048576
        hard: 1048576
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:4002/health"]
      interval: 10s
      timeout: 5s
      retries: 2
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "0.5"

  gateway-4:
    build:
      context: .
      dockerfile: docker/Dockerfile.gateway
    restart: unless-stopped
    ports:
      - "127.0.0.1:4032:4002"
    env_file: .env.prod
    environment:
      API_PORT: "4002"
      GATEWAY_PORT: "4002"
      NODE_OPTIONS: "--max-old-space-size=768"
      ENABLE_PRESENCE: "false"
      GATEWAY_HEARTBEAT_INTERVAL: "60000"
      WORKER_ID: "4"
      PROCESS_ID: "1"
      SHARD_ID: "3"
      NUM_SHARDS: "4"
    depends_on:
      redis:
        condition: service_healthy
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    read_only: true
    tmpfs: [/tmp]
    ulimits:
      nofile:
        soft: 1048576
        hard: 1048576
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:4002/health"]
      interval: 10s
      timeout: 5s
      retries: 2
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "0.5"

volumes:
  redis-data:
