services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    command: sh -c "redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru --requirepass $$REDIS_PASSWORD"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD --no-auth-warning ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    env_file: .env.prod
    volumes:
      - redis-data:/data
    cap_drop: [ALL]
    cap_add: [DAC_OVERRIDE, SETGID, SETUID]
    security_opt: [no-new-privileges:true]
    deploy:
      resources:
        limits:
          memory: 600M
          cpus: "1.0"

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    restart: unless-stopped
    ports:
      - "127.0.0.1:4000:4000"
    env_file: .env.prod
    environment:
      API_PORT: "4000"
      NODE_OPTIONS: "--max-old-space-size=384"
    depends_on:
      redis:
        condition: service_healthy
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    read_only: true
    tmpfs: [/tmp]
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:4000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 600M
          cpus: "1.0"

  auth:
    build:
      context: .
      dockerfile: docker/Dockerfile.auth
    restart: unless-stopped
    ports:
      - "127.0.0.1:4001:4001"
    env_file: .env.prod
    environment:
      API_PORT: "4001"
      NODE_OPTIONS: "--max-old-space-size=384"
    depends_on:
      redis:
        condition: service_healthy
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    read_only: true
    tmpfs: [/tmp]
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:4001/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 600M
          cpus: "1.0"

  gateway:
    build:
      context: .
      dockerfile: docker/Dockerfile.gateway
    restart: unless-stopped
    ports:
      - "127.0.0.1:4002:4002"
    env_file: .env.prod
    environment:
      API_PORT: "4002"
      NODE_OPTIONS: "--max-old-space-size=384"
    depends_on:
      redis:
        condition: service_healthy
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    read_only: true
    tmpfs: [/tmp]
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:4002/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 600M
          cpus: "1.0"

volumes:
  redis-data:
