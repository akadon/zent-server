# Management panel
# Proxies to Grafana (single pane) + OliveTin (embedded via /olivetin/)
# Secured by Cloudflare Access (free zero-trust) — only CF-authenticated requests reach here
# Set MANAGE_DOMAIN to your management subdomain

server {
    listen 80;
    server_name $MANAGE_DOMAIN;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name $MANAGE_DOMAIN;

    ssl_certificate /etc/nginx/ssl/origin-cert.pem;
    ssl_certificate_key /etc/nginx/ssl/origin-key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Cloudflare-only access (add Cloudflare IP ranges)
    # https://www.cloudflare.com/ips/
    # Or use Cloudflare Tunnel (cloudflared) for zero-trust

    # Grafana (main UI)
    location / {
        proxy_pass http://127.0.0.1:3100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (Grafana live)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Grafana API (for provisioning)
    location /api/ {
        proxy_pass http://127.0.0.1:3100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # OliveTin (management buttons)
    location /olivetin/ {
        proxy_pass http://127.0.0.1:1337/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (OliveTin real-time updates)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Health check
    location /health {
        return 200 '{"status":"ok","service":"management"}';
        add_header Content-Type application/json;
    }

    # Deny access to Prometheus directly (use Grafana)
    location /prometheus {
        return 403;
    }
}
