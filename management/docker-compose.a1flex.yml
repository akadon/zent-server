# Management stack for A1.Flex (Main server, ARM64, 24GB)
# Grafana (single pane) + Prometheus + node-exporter + OliveTin + CrowdSec
# Total RAM: ~500MB (Grafana 200M, Prometheus 128M, rest ~170M)

services:
  # Prometheus — metrics collection and storage
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "127.0.0.1:9190:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --storage.tsdb.retention.size=2GB
      - --web.enable-lifecycle
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"

  # Prometheus node exporter — host metrics
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped
    network_mode: host
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/rootfs
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
      - --web.listen-address=127.0.0.1:9100
    deploy:
      resources:
        limits:
          memory: 32M
          cpus: "0.1"

  # Grafana — single pane of glass (dashboards + OliveTin embed)
  grafana:
    image: grafana/grafana-oss:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "127.0.0.1:3100:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-changeme}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_PANELS_DISABLE_SANITIZE_HTML: "true"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_SERVER_ROOT_URL: "https://manage.3aka.com"
      GF_SERVER_SERVE_FROM_SUB_PATH: "false"
      # Junior-dev RBAC: Viewer role by default
      GF_USERS_DEFAULT_THEME: dark
      GF_USERS_AUTO_ASSIGN_ORG_ROLE: Viewer
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          memory: 200M
          cpus: "0.25"

  # OliveTin — custom management buttons
  olivetin:
    image: jamesread/olivetin:latest
    container_name: olivetin
    restart: unless-stopped
    ports:
      - "127.0.0.1:1337:1337"
    volumes:
      - ./olivetin/config.yaml:/config/config.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /home/ubuntu/.ssh/server-key:/keys/server-key:ro
    deploy:
      resources:
        limits:
          memory: 48M
          cpus: "0.1"

  # CrowdSec — intrusion detection + community blocklists
  crowdsec:
    image: crowdsecurity/crowdsec:latest
    container_name: crowdsec
    restart: unless-stopped
    environment:
      COLLECTIONS: "crowdsecurity/linux crowdsecurity/nginx crowdsecurity/sshd"
      GID: "${GID-1000}"
    volumes:
      - crowdsec-db:/var/lib/crowdsec/data
      - crowdsec-config:/etc/crowdsec
      - /var/log/nginx:/var/log/nginx:ro
      - /var/log/auth.log:/var/log/auth.log:ro
      - /var/log/syslog:/var/log/syslog:ro
    ports:
      - "127.0.0.1:8080:8080"
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.15"

volumes:
  prometheus-data:
  grafana-data:
  crowdsec-db:
  crowdsec-config:
