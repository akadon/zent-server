name: Backend Tests

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - name: Build workspace packages
        run: |
          for pkg in packages/types packages/snowflake packages/permissions packages/gateway-types; do
            cd $GITHUB_WORKSPACE/$pkg && npx tsc --skipLibCheck || true
          done
      - run: cd apps/api && npm test
